services:
  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFERIPADDRESS=true
      - "SPRING_DATASOURCE_URL=jdbc:mysql://order-mysql:3306/OrderServiceDatabase?allowPublicKeyRetrieval=true&useSSL=false"
    depends_on:
      order-mysql:
        condition: service_healthy
    networks:
      - microservices-net

  order-mysql:
    image: mysql:8.0
    container_name: order-mysql
    # Not published to the host (your local MySQL already owns host 3306).
    # Reachable by other containers at order-mysql:3306 on the shared network.
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=OrderServiceDatabase
    volumes:
      - order-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

volumes:
  order-mysql-data:

networks:
  microservices-net:
    external: true

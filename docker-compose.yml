services:
  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFERIPADDRESS=true
      - "SPRING_DATASOURCE_URL=jdbc:mysql://order-mysql:3306/OrderServiceDatabase?allowPublicKeyRetrieval=true&useSSL=false"
      # Config repo sets spring.kafka.consumer.bootstrap-servers=http://localhost:9092.
      # Override the consumer sub-key so the @KafkaListener reaches the broker container.
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_CONSUMER_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      order-mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - microservices-net

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    # Not published to the host (your local Kafka already owns host 9092).
    # Reachable by other containers at kafka:9092 on the shared network.
    environment:
      # --- KRaft (no Zookeeper): this single node is both broker and controller ---
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # --- Listeners (internal only; no host-facing EXTERNAL listener) ---
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Allow topic auto-creation on first produce/consume (matches app behaviour)
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      # Persist KRaft data here (official image defaults to /tmp; override for the volume)
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - microservices-net

  order-mysql:
    image: mysql:8.0
    container_name: order-mysql
    # Not published to the host (your local MySQL already owns host 3306).
    # Reachable by other containers at order-mysql:3306 on the shared network.
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=OrderServiceDatabase
    volumes:
      - order-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

volumes:
  order-mysql-data:
  kafka-data:

networks:
  microservices-net:
    external: true
